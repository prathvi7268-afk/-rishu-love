<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For My Love ❤️</title>

  <style>
    body {
      text-align: center;
      background: linear-gradient(135deg, #ff9a9e, #ff4d6d);
      font-family: Arial, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji";
      color: white;
      padding-top: 60px;
    }

    h1 {
      font-size: 28px;
      padding: 10px;
    }

    button {
      padding: 12px 20px;
      margin: 10px;
      border: none;
      border-radius: 25px;
      background: white;
      color: #ff4d6d;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      transform: scale(1.05);
      transition: 0.2s;
    }

    .gif-box {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .gif-box img {
      width: 160px;
      border-radius: 20px;
    }
  </style>
</head>

<body>

<h1 id="text">Kesi ho ji ❤️</h1>

<!-- 💗 3 GIF SECTION -->
<div class="gif-box">
  <img src="gif1.gif" alt="gif1">
  <img src="gif2.gif" alt="gif2">
  <img src="gif3.gif" alt="gif3">
</div>

<div id="buttons">
  <button onclick="step1()">Apki hu ji 🤭❤️</button>
</div>

<script>
function setButtons(html){
  document.getElementById("buttons").innerHTML = html;
}

// Step 1
function step1(){
  document.getElementById("text").innerHTML = "Apke Bhondu ne banaya h 🥺👉🏻👈🏻";
  setButtons('<button onclick="step2()">Next 💖</button>');
}

// Step 2
function step2(){
  document.getElementById("text").innerHTML = "🥺❤️ maaf kr dijiye na please";
  setButtons(`
    <button onclick="step3()">Kr dia baby 😿💗</button>
    <button onclick="no1()">No 😡</button>
  `);
}

// NO loop
function no1(){
  document.getElementById("text").innerHTML = "Maaf krna hoga 😤💗";
  setButtons('<button onclick="step3()">Yes ji 😌💗</button>');
}

// Step 3
function step3(){
  document.getElementById("text").innerHTML = "Will you marry me 🤭❤️😭";
  setButtons(`
    <button onclick="final()">Yes 💍💗</button>
    <button onclick="no2()">No 😡</button>
  `);
}

// NO loop marriage
function no2(){
  document.getElementById("text").innerHTML = "Eeeee chup chap hn boliye 😡💗";
  setButtons('<button onclick="final()">Yes ji 😳💗</button>');
}

// Final
function final(){
  document.getElementById("text").innerHTML =
    "I'll never leave you mera bachcha 😭🫶🏻💗<br>I'm always with you 💗";
  setButtons('');
}
</script>

</body>
</html>
